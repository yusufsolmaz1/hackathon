openapi: 3.0.3
info:
  title: TrendSocial API
  description: |
    TrendSocial mobil uygulaması icin backend API dokumantasyonu.

    ## Kimlik Dogrulama
    Login ve register haricindeki tum endpoint'ler `Authorization: Bearer <token>` header'i gerektirir.
    Token, login veya register response'unda doner.

    ## Genel Kurallar
    - Tum request/response body'leri `application/json` formatindadir
    - Field isimleri `snake_case` kullanir
    - Tarihler ISO 8601 formatindadir (`2026-05-07T14:30:00Z`)
    - Fiyatlar `Double` olarak TL cinsinden doner
    - Sayfalama (pagination) su an icin uygulanmamistir

    ## Hata Formati
    Tum hatalar asagidaki formatta doner:
    ```json
    {
      "error": {
        "code": "UNAUTHORIZED",
        "message": "Oturum sureniz doldu. Lutfen tekrar giris yapin."
      }
    }
    ```
  version: 1.0.0
  contact:
    name: TrendSocial Dev Team

servers:
  - url: https://hackathon-dkpy.onrender.com
    description: Render (production)
  - url: http://localhost:8080
    description: Local
  - url: https://api.trendsocial.com
    description: (placeholder)

tags:
  - name: Auth
    description: Kimlik dogrulama islemleri (login, register, profil)
  - name: Products
    description: Urun listeleme, arama, favori islemleri
  - name: Collections
    description: Koleksiyon CRUD ve paylasim islemleri
  - name: Friends
    description: Arkadas ekleme, silme, rehber senkronizasyonu
  - name: Cart
    description: Sepet islemleri
  - name: Orders
    description: Siparis olusturma, listeleme, ortak odeme

# ============================================================
# PATHS
# ============================================================
paths:

  # ──────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Kullanici girisi
      description: E-posta ve sifre ile giris yapar. Basarili olursa JWT token ve kullanici bilgisi doner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "kullanici@example.com"
              password: "Sifre123!"
      responses:
        '200':
          description: Basarili giris
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: "eyJhbGciOiJIUzI1NiIs..."
                user:
                  id: "usr_abc123"
                  name: "Burak Filiz"
                  email: "kullanici@example.com"
                  avatar_url: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/register:
    post:
      tags: [Auth]
      summary: Yeni kullanici kaydi
      description: Ad, e-posta ve sifre ile yeni hesap olusturur. Basarili olursa JWT token ve kullanici bilgisi doner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: "Burak Filiz"
              email: "kullanici@example.com"
              password: "Sifre123!"
      responses:
        '201':
          description: Basarili kayit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Gecersiz veri veya e-posta zaten kayitli
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: "EMAIL_EXISTS"
                  message: "Bu e-posta adresi zaten kayitli."
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/profile:
    get:
      tags: [Auth]
      summary: Kullanici profilini getir
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Kullanici profili
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                id: "usr_abc123"
                name: "Burak Filiz"
                email: "kullanici@example.com"
                avatar_url: "https://cdn.trendsocial.com/avatars/usr_abc123.jpg"
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Auth]
      summary: Kullanici profilini guncelle
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              name: "Burak F."
              email: null
              avatar_url: null
      responses:
        '200':
          description: Guncellenmis profil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ──────────────────────────────────────────────
  # PRODUCTS
  # ──────────────────────────────────────────────
  /products:
    get:
      tags: [Products]
      summary: Tum urunleri listele
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Urun listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
              example:
                - id: "prd_001"
                  brand: "Zara"
                  name: "Siyah V Yaka Askili Midi Boy Viskon Elbise"
                  rating: 4.8
                  review_count: 124
                  price: 599.99
                  image_name: "zara_dress"
                  is_favorite: true
                - id: "prd_002"
                  brand: "Nike"
                  name: "Air Max 270 Kirmizi Erkek Spor Ayakkabi"
                  rating: 4.9
                  review_count: 856
                  price: 3299.00
                  image_name: "nike_shoe"
                  is_favorite: false
        '401':
          $ref: '#/components/responses/Unauthorized'

  /products/{id}:
    get:
      tags: [Products]
      summary: Urun detayini getir
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "prd_001"
      responses:
        '200':
          description: Urun detayi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /products/search:
    get:
      tags: [Products]
      summary: Urun ara
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Arama sorgusu
          schema:
            type: string
          example: "nike ayakkabi"
      responses:
        '200':
          description: Arama sonuclari
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /products/favorites:
    get:
      tags: [Products]
      summary: Favori urunleri listele
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Favori urun listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /products/{id}/favorite:
    put:
      tags: [Products]
      summary: Urunu favorilere ekle/cikar (toggle)
      description: Urun favorilerde ise cikarir, degilse ekler.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "prd_001"
      responses:
        '200':
          description: Favori durumu guncellendi
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_favorite:
                    type: boolean
              example:
                is_favorite: true
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /products/{id}/like:
    put:
      tags: [Products]
      summary: Urun begeni durumunu guncelle
      description: |
        Urune like, dislike veya begeniyi kaldirma islemi yapar.
        Bir urun ayni anda hem liked hem disliked olamaz.
        `none` gonderildiginde mevcut begeni kaldirilir.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Urun ID'si
          schema:
            type: string
          example: "prd_001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LikeStatusRequest'
            example:
              status: "liked"
      responses:
        '200':
          description: Guncellenmis begeni durumu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeState'
              example:
                status: "liked"
                like_count: 25
                dislike_count: 2
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # COLLECTIONS
  # ──────────────────────────────────────────────
  /collections:
    get:
      tags: [Collections]
      summary: Koleksiyonlari listele
      description: Kullanicinin kendi koleksiyonlari ve dahil oldugu ortak koleksiyonlari doner.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Koleksiyon listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductCollection'
              example:
                - id: "col_001"
                  name: "Yaz Tatili Plani"
                  participant_count: 3
                  product_count: 12
                  image_name: "yaz_tatili"
                  is_shared: true
                  is_selected: false
                - id: "col_002"
                  name: "Favori Ayakkabilar"
                  participant_count: null
                  product_count: 42
                  image_name: "favori_ayakkabi"
                  is_shared: false
                  is_selected: false
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Collections]
      summary: Yeni koleksiyon olustur
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionRequest'
            example:
              name: "Yaz Tatili Plani"
              description: "Tatil icin alinacaklar"
              is_shared: true
              friend_ids: ["frn_001", "frn_002"]
      responses:
        '201':
          description: Olusturulan koleksiyon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /collections/{id}:
    get:
      tags: [Collections]
      summary: Koleksiyon detayini getir
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "col_001"
      responses:
        '200':
          description: Koleksiyon detayi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCollection'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /collections/{id}/share:
    post:
      tags: [Collections]
      summary: Koleksiyonu arkadaslarla paylas
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "col_001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareCollectionRequest'
            example:
              friend_ids: ["frn_001", "frn_003"]
      responses:
        '200':
          description: Koleksiyon basariyla paylasildi
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Koleksiyon 2 arkadasinizla paylasildi."
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # FRIENDS
  # ──────────────────────────────────────────────
  /friends:
    get:
      tags: [Friends]
      summary: Arkadas listesini getir
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Arkadas listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FriendDTO'
              example:
                - id: "frn_001"
                  name: "Ayse Yilmaz"
                  email: "ayse.yilmaz@example.com"
                  avatar_color_name: "orange"
                - id: "frn_002"
                  name: "Burak Can"
                  email: "burak.can@example.com"
                  avatar_color_name: "blue"
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Friends]
      summary: E-posta ile arkadas ekle
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFriendRequest'
            example:
              email: "yeni.arkadas@example.com"
      responses:
        '201':
          description: Eklenen arkadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendDTO'
              example:
                id: "frn_004"
                name: "Yeni Arkadas"
                email: "yeni.arkadas@example.com"
                avatar_color_name: "green"
        '400':
          description: Gecersiz e-posta veya kullanici bulunamadi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: "USER_NOT_FOUND"
                  message: "Bu e-posta adresine ait kullanici bulunamadi."
        '401':
          $ref: '#/components/responses/Unauthorized'

  /friends/{id}:
    delete:
      tags: [Friends]
      summary: Arkadasi sil
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "frn_001"
      responses:
        '204':
          description: Arkadas basariyla silindi
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /friends/sync:
    post:
      tags: [Friends]
      summary: Rehber kisilerini senkronize et
      description: |
        Telefon rehberindeki kisileri gonderir, TrendSocial kullanicisi olanlari doner.
        Eslesen kisiler otomatik olarak arkadas olarak eklenmez, sadece sonuc listesi doner.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncContactsRequest'
            example:
              contacts:
                - name: "Ayse Yilmaz"
                  email: "ayse.yilmaz@example.com"
                - name: "Mehmet Kaya"
                  email: "mehmet.kaya@example.com"
                - name: "Fatma Demir"
                  email: "fatma@noemail.com"
      responses:
        '200':
          description: Eslesen kullanicilar
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FriendDTO'
              example:
                - id: "frn_001"
                  name: "Ayse Yilmaz"
                  email: "ayse.yilmaz@example.com"
                  avatar_color_name: "orange"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # CART
  # ──────────────────────────────────────────────
  /cart:
    get:
      tags: [Cart]
      summary: Sepetteki urunleri getir
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Sepet icerigi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CartItemDTO'
              example:
                - id: "crt_001"
                  brand: "Nike"
                  name: "Air Max 270"
                  size: "42"
                  price: 3299.00
                  quantity: 1
                  icon_name: "shoe"
                - id: "crt_002"
                  brand: "Apple"
                  name: "Watch Series 8"
                  size: "45mm"
                  price: 11499.00
                  quantity: 1
                  icon_name: "applewatch"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cart/items:
    post:
      tags: [Cart]
      summary: Sepete urun ekle
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCartRequest'
            example:
              product_id: "prd_002"
              size: "42"
              quantity: 1
      responses:
        '201':
          description: Eklenen sepet ogesi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItemDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Urun bulunamadi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: "PRODUCT_NOT_FOUND"
                  message: "Urun bulunamadi."
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cart/items/{id}:
    put:
      tags: [Cart]
      summary: Sepetteki urunun miktarini guncelle
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "crt_001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQuantityRequest'
            example:
              quantity: 3
      responses:
        '200':
          description: Guncellenmis sepet ogesi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItemDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Cart]
      summary: Sepetten urun kaldir
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "crt_001"
      responses:
        '204':
          description: Urun sepetten kaldirildi
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # ORDERS
  # ──────────────────────────────────────────────
  /orders:
    get:
      tags: [Orders]
      summary: Siparisleri listele
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Siparis listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDTO'
              example:
                - id: "ord_001"
                  order_number: "TS-20260507-001"
                  items:
                    - name: "Air Max 270"
                      brand: "Nike"
                      quantity: 1
                      price: 3299.00
                      icon_name: "shoe"
                  total_price: 3299.00
                  status: "shipped"
                  created_at: "2026-05-07T10:30:00Z"
                  estimated_delivery: "2026-05-10T18:00:00Z"
                  is_split_payment: false
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Orders]
      summary: Yeni siparis olustur
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              items:
                - product_id: "prd_002"
                  name: "Air Max 270"
                  brand: "Nike"
                  quantity: 1
                  price: 3299.00
                  icon_name: "shoe"
              total_price: 3299.00
      responses:
        '201':
          description: Olusturulan siparis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Siparis detayini getir
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "ord_001"
      responses:
        '200':
          description: Siparis detayi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /orders/split:
    post:
      tags: [Orders]
      summary: Ortak odemeli siparis olustur
      description: |
        Siparis tutarini arkadaslar arasinda bolerek olusturur.
        Her katilimcinin odeyecegi tutar `participants` dizisinde belirtilir.
        Katilimcilar odeme yapana kadar siparis "payment_pending" durumunda kalir.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSplitOrderRequest'
            example:
              items:
                - product_id: "prd_002"
                  name: "Air Max 270"
                  brand: "Nike"
                  quantity: 1
                  price: 3299.00
                  icon_name: "shoe"
                - product_id: "prd_003"
                  name: "Watch Series 8"
                  brand: "Apple"
                  quantity: 1
                  price: 11499.00
                  icon_name: "applewatch"
              total_price: 14798.00
              participants:
                - friend_id: "frn_001"
                  amount: 7399.00
                - friend_id: "frn_002"
                  amount: 7399.00
      responses:
        '201':
          description: Olusturulan ortak odemeli siparis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
              example:
                id: "ord_005"
                order_number: "TS-20260507-005"
                items:
                  - name: "Air Max 270"
                    brand: "Nike"
                    quantity: 1
                    price: 3299.00
                    icon_name: "shoe"
                  - name: "Watch Series 8"
                    brand: "Apple"
                    quantity: 1
                    price: 11499.00
                    icon_name: "applewatch"
                total_price: 14798.00
                status: "payment_pending"
                created_at: "2026-05-07T14:00:00Z"
                estimated_delivery: null
                is_split_payment: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /orders/{id}/split-status:
    get:
      tags: [Orders]
      summary: Ortak odeme durumunu getir
      description: Her katilimcinin odeme yapip yapmadigi bilgisini doner.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "ord_005"
      responses:
        '200':
          description: Ortak odeme durumu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SplitBillStatusDTO'
              example:
                order_id: "ord_005"
                participants:
                  - friend_id: "frn_001"
                    name: "Ayse Yilmaz"
                    has_paid: true
                  - friend_id: "frn_002"
                    name: "Burak Can"
                    has_paid: false
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

# ============================================================
# COMPONENTS
# ============================================================
components:

  # ──────────────── Security ────────────────
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Login veya register sonrasi alinan JWT token

  # ──────────────── Reusable Responses ────────────────
  responses:
    Unauthorized:
      description: Oturum suresi dolmus veya token gecersiz
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "UNAUTHORIZED"
              message: "Oturum sureniz doldu. Lutfen tekrar giris yapin."

    Forbidden:
      description: Yetki hatasi
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "FORBIDDEN"
              message: "Bu islem icin yetkiniz bulunmuyor."

    NotFound:
      description: Kaynak bulunamadi
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "NOT_FOUND"
              message: "Istenen icerik bulunamadi."

    BadRequest:
      description: Gecersiz istek verisi
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "BAD_REQUEST"
              message: "Gecersiz veri gonderildi. Lutfen alanlari kontrol edin."

    ServerError:
      description: Sunucu hatasi
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "SERVER_ERROR"
              message: "Sunucu hatasi. Lutfen daha sonra tekrar deneyin."

  # ──────────────── Schemas ────────────────
  schemas:

    # ── Error ──
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Makine tarafindan okunabilir hata kodu
              enum:
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - BAD_REQUEST
                - EMAIL_EXISTS
                - USER_NOT_FOUND
                - PRODUCT_NOT_FOUND
                - SERVER_ERROR
            message:
              type: string
              description: Kullaniciya gosterilebilir Turkce hata mesaji

    # ── Auth ──
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 6

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 6

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT Bearer token
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
          example: "usr_abc123"
        name:
          type: string
          example: "Burak Filiz"
        email:
          type: string
          format: email
          example: "kullanici@example.com"
        avatar_url:
          type: string
          format: uri
          nullable: true

    # ── Product ──
    Product:
      type: object
      required: [id, brand, name, rating, review_count, price, image_name, is_favorite]
      properties:
        id:
          type: string
          example: "prd_001"
        brand:
          type: string
          example: "Zara"
        name:
          type: string
          example: "Siyah V Yaka Askili Midi Boy Viskon Elbise"
        rating:
          type: number
          format: double
          minimum: 0
          maximum: 5
          example: 4.8
        review_count:
          type: integer
          example: 124
        price:
          type: number
          format: double
          description: Birim fiyat (TL)
          example: 599.99
        image_name:
          type: string
          example: "zara_dress"
        is_favorite:
          type: boolean
          example: true

    # ── Collection ──
    ProductCollection:
      type: object
      required: [id, name, product_count, image_name, is_shared, is_selected]
      properties:
        id:
          type: string
          example: "col_001"
        name:
          type: string
          example: "Yaz Tatili Plani"
        participant_count:
          type: integer
          nullable: true
          description: Ortak koleksiyonlarda katilimci sayisi. Kisisel koleksiyonlarda null.
          example: 3
        product_count:
          type: integer
          example: 12
        image_name:
          type: string
          example: "yaz_tatili"
        is_shared:
          type: boolean
          example: true
        is_selected:
          type: boolean
          description: Koleksiyona ekleme ekraninda secim durumu
          example: false

    CreateCollectionRequest:
      type: object
      required: [name, is_shared]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          nullable: true
          maxLength: 500
        is_shared:
          type: boolean
        friend_ids:
          type: array
          items:
            type: string
          description: Koleksiyona davet edilecek arkadaslarin ID'leri

    ShareCollectionRequest:
      type: object
      required: [friend_ids]
      properties:
        friend_ids:
          type: array
          items:
            type: string
          minItems: 1

    # ── Like ──
    LikeStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: "Begeni durumu: liked (begen), disliked (begenme), none (kaldir)"
          enum: [liked, disliked, none]
          example: "liked"

    LikeState:
      type: object
      required: [status, like_count, dislike_count]
      properties:
        status:
          type: string
          description: Kullanicinin mevcut begeni durumu
          enum: [liked, disliked, none]
          example: "liked"
        like_count:
          type: integer
          description: Toplam begeni sayisi
          example: 25
        dislike_count:
          type: integer
          description: Toplam begenme sayisi
          example: 2

    # ── Friend ──
    FriendDTO:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
          example: "frn_001"
        name:
          type: string
          example: "Ayse Yilmaz"
        email:
          type: string
          format: email
          example: "ayse.yilmaz@example.com"
        avatar_color_name:
          type: string
          nullable: true
          description: Avatar renk adi (orange, blue, green, purple, pink, brown, red, teal)
          enum: [orange, blue, green, purple, pink, brown, red, teal]
          example: "orange"

    AddFriendRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    SyncContactsRequest:
      type: object
      required: [contacts]
      properties:
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactPayload'

    ContactPayload:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
          format: email

    # ── Cart ──
    CartItemDTO:
      type: object
      required: [id, brand, name, size, price, quantity, icon_name]
      properties:
        id:
          type: string
          example: "crt_001"
        brand:
          type: string
          example: "Nike"
        name:
          type: string
          example: "Air Max 270"
        size:
          type: string
          example: "42"
        price:
          type: number
          format: double
          description: Birim fiyat (TL)
          example: 3299.00
        quantity:
          type: integer
          minimum: 1
          example: 1
        icon_name:
          type: string
          description: SF Symbols ikon adi
          example: "shoe"

    AddToCartRequest:
      type: object
      required: [product_id, size, quantity]
      properties:
        product_id:
          type: string
        size:
          type: string
        quantity:
          type: integer
          minimum: 1

    UpdateQuantityRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1

    # ── Order ──
    OrderDTO:
      type: object
      required: [id, order_number, items, total_price, status, created_at, is_split_payment]
      properties:
        id:
          type: string
          example: "ord_001"
        order_number:
          type: string
          description: Kullaniciya gosterilen siparis numarasi
          example: "TS-20260507-001"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemDTO'
        total_price:
          type: number
          format: double
          example: 3299.00
        status:
          type: string
          description: Siparis durumu
          enum:
            - pending
            - payment_pending
            - confirmed
            - preparing
            - shipped
            - delivered
            - cancelled
          example: "shipped"
        created_at:
          type: string
          format: date-time
          example: "2026-05-07T10:30:00Z"
        estimated_delivery:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-10T18:00:00Z"
        is_split_payment:
          type: boolean
          example: false

    OrderItemDTO:
      type: object
      required: [name, brand, quantity, price, icon_name]
      properties:
        name:
          type: string
          example: "Air Max 270"
        brand:
          type: string
          example: "Nike"
        quantity:
          type: integer
          example: 1
        price:
          type: number
          format: double
          example: 3299.00
        icon_name:
          type: string
          example: "shoe"

    CreateOrderRequest:
      type: object
      required: [items, total_price]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRequest'
          minItems: 1
        total_price:
          type: number
          format: double

    CreateSplitOrderRequest:
      type: object
      required: [items, total_price, participants]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRequest'
          minItems: 1
        total_price:
          type: number
          format: double
        participants:
          type: array
          items:
            $ref: '#/components/schemas/SplitParticipant'
          minItems: 1

    OrderItemRequest:
      type: object
      required: [product_id, name, brand, quantity, price, icon_name]
      properties:
        product_id:
          type: string
        name:
          type: string
        brand:
          type: string
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          format: double
        icon_name:
          type: string

    SplitParticipant:
      type: object
      required: [friend_id, amount]
      properties:
        friend_id:
          type: string
        amount:
          type: number
          format: double
          description: Katilimcinin odeyecegi tutar (TL)

    SplitBillStatusDTO:
      type: object
      required: [order_id, participants]
      properties:
        order_id:
          type: string
          example: "ord_005"
        participants:
          type: array
          items:
            $ref: '#/components/schemas/ParticipantStatusDTO'

    ParticipantStatusDTO:
      type: object
      required: [friend_id, name, has_paid]
      properties:
        friend_id:
          type: string
          example: "frn_001"
        name:
          type: string
          example: "Ayse Yilmaz"
        has_paid:
          type: boolean
          example: true
